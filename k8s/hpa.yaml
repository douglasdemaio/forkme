apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: forkme
  namespace: forkit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: forkme
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
