apiVersion: apps/v1
kind: Deployment
metadata:
  name: forkme
  namespace: forkit
  labels:
    app: forkme
    app.kubernetes.io/part-of: forkit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forkme
  template:
    metadata:
      labels:
        app: forkme
    spec:
      containers:
        - name: forkme
          image: forkme:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: forkme-config
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      restartPolicy: Always
